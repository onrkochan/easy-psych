<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hezeyan Türleri — DSM-5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;color:#1a1a1a;background:#f5f5f3}
.app{max-width:460px;margin:0 auto;padding:12px}
@media (min-width:768px){
  .app{max-width:720px;padding:20px}
  body{font-size:15px}
}
@media (min-width:1100px){
  .app{max-width:1080px;padding:28px}
  .screen.active#organik,
  .screen.active#psikiyatrik{max-width:820px;margin:0 auto}
}
.screen{display:none}
.screen.active{display:block}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.page-title{font-size:18px;font-weight:500;margin-bottom:4px}
.page-sub{font-size:13px;color:#666;margin-bottom:16px}
.section-label{font-size:12px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.flow-arrow{text-align:center;font-size:22px;color:#888;margin:8px 0}
.rass-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.rass-btn{padding:10px 8px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-size:13px;color:#1a1a1a}
.rass-btn:hover{background:#f0f0ee}
.rass-btn.selected{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.rass-score{font-size:18px;font-weight:500;display:block;margin-bottom:2px}
.rass-label{font-size:11px;color:inherit;opacity:.8}
.feedback-box{padding:12px;border-radius:8px;margin:12px 0;font-size:14px;line-height:1.5}
.fb-danger{background:#FCEBEB;color:#A32D2D;border:0.5px solid #F09595}
.fb-warning{background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27}
.fb-success{background:#EAF3DE;color:#3B6D11;border:0.5px solid #97C459}
.fb-info{background:#E6F1FB;color:#0C447C;border:0.5px solid #85B7EB}
.btn-primary{display:block;width:100%;padding:12px;background:#185FA5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:12px;text-align:center}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-secondary{display:block;width:100%;padding:10px;background:#fff;color:#1a1a1a;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px;text-align:center}
.btn-back{background:none;border:none;cursor:pointer;font-size:13px;color:#888;padding:0;margin-bottom:14px;display:flex;align-items:center;gap:4px}
.cam-item{border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:12px;margin-bottom:8px}
.cam-q{font-size:14px;font-weight:500;margin-bottom:8px}
.cam-note{font-size:12px;color:#666;margin-top:4px}
.radio-row{display:flex;gap:8px;margin-top:6px}
.radio-btn{flex:1;padding:8px 4px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;text-align:center;color:#1a1a1a}
.radio-btn.selected-evet{border:2px solid #3B6D11;background:#EAF3DE;color:#3B6D11;font-weight:500}
.radio-btn.selected-hayir{border:2px solid #A32D2D;background:#FCEBEB;color:#A32D2D;font-weight:500}
.score-display{background:#f5f5f3;border-radius:8px;padding:12px;margin:12px 0;display:flex;justify-content:space-between;align-items:center}
.score-num{font-size:28px;font-weight:500}
.score-interp{font-size:13px;color:#666;text-align:right;max-width:60%}
.drs-item{border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:10px 12px;margin-bottom:8px}
.drs-q{font-size:13px;font-weight:500;margin-bottom:6px}
.drs-options{display:flex;flex-direction:column;gap:4px}
.drs-opt{padding:7px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#1a1a1a;text-align:left}
.drs-opt.selected{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.checklist-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.checklist-item:last-child{border-bottom:none}
.check-box{width:22px;height:22px;min-width:22px;border:0.5px solid rgba(0,0,0,0.2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;background:#fff;font-size:14px;color:#185FA5}
.check-box.checked{background:#185FA5;border-color:#185FA5;color:#fff}
.check-text{font-size:13px;line-height:1.5;flex:1}
.check-sub{font-size:11px;color:#888;margin-top:2px}
.dd-section{margin-bottom:14px;padding-bottom:14px;border-bottom:0.5px solid rgba(0,0,0,0.08)}
.dd-section:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}
.dd-title{font-size:14px;font-weight:500;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.dd-criteria{font-size:12px;color:#555;line-height:1.6}
.dd-action{font-size:12px;color:#0C447C;background:#E6F1FB;padding:6px 8px;border-radius:6px;margin-top:6px;line-height:1.4}
.badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
.badge-blue{background:#E6F1FB;color:#185FA5}
.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-green{background:#EAF3DE;color:#3B6D11}
.badge-purple{background:#EEEDFE;color:#3C3489}
.progress{display:flex;gap:4px;margin-bottom:16px}
.progress-dot{height:4px;flex:1;border-radius:2px;background:rgba(0,0,0,0.1)}
.progress-dot.done{background:#185FA5}
.progress-dot.active{background:#B5D4F4}
.lab-row{display:grid;grid-template-columns:120px 1fr 70px;gap:8px;align-items:center;padding:8px 0;border-bottom:0.5px solid rgba(0,0,0,0.06)}
.lab-row:last-child{border-bottom:none}
.lab-name{font-size:13px;font-weight:500}
.lab-input{padding:6px 8px;border:0.5px solid rgba(0,0,0,0.2);border-radius:6px;font-size:13px;width:100%}
.lab-unit{font-size:11px;color:#888}
.lab-result{margin-top:4px;font-size:11px;padding:4px 8px;border-radius:4px;display:none}
.lab-result.shown{display:block}
.lab-normal{background:#EAF3DE;color:#3B6D11}
.lab-mild{background:#FAEEDA;color:#854F0B}
.lab-severe{background:#FCEBEB;color:#A32D2D}
.red-flag{border:0.5px solid #F09595;border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#FEF8F8}
.rf-head{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.rf-title{font-size:13px;font-weight:500;color:#A32D2D}
.rf-toggle{font-size:18px;color:#A32D2D}
.rf-body{display:none;margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(163,45,45,0.2)}
.rf-body.open{display:block}
.rf-clues{font-size:12px;color:#555;line-height:1.6;margin-bottom:6px}
.rf-action{font-size:12px;color:#A32D2D;font-weight:500;background:#FCEBEB;padding:6px 8px;border-radius:6px}
.konsult-item{padding:10px 12px;border-left:3px solid #185FA5;background:#F5F9FE;border-radius:0 8px 8px 0;margin-bottom:8px}
.konsult-name{font-size:13px;font-weight:500;color:#0C447C;margin-bottom:2px}
.konsult-when{font-size:12px;color:#555;line-height:1.5}
.summary-box{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;line-height:1.5}
.rdm-group{margin-bottom:14px}
.rdm-title{font-size:12px;font-weight:600;color:#1a1a1a;margin-bottom:6px;text-transform:none}
.rdm-opts{display:flex;flex-wrap:wrap;gap:6px}
.rdm-opt{padding:6px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:14px;background:#fff;font-size:12px;color:#1a1a1a;cursor:pointer;transition:all 0.15s;position:relative;font-family:inherit}
.rdm-opt:hover{background:#f0f0ee}
.rdm-opt.selected{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.rdm-opt[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 4px);left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:6px 10px;border-radius:6px;font-size:11px;white-space:normal;width:max-content;max-width:240px;z-index:10;line-height:1.4;pointer-events:none;text-align:left}
.rdm-other-input{padding:6px 10px;border:0.5px dashed rgba(0,0,0,0.3);border-radius:14px;background:#fafaf8;font-size:12px;font-family:inherit;width:140px;outline:none}
.rdm-other-input:focus{border-color:#1a1a1a;border-style:solid;background:#fff}

.rdm-section-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:0}
.rdm-skip-btn{padding:5px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:14px;background:#fff;font-size:12px;color:#1a1a1a;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all 0.15s}
.rdm-skip-btn:hover{background:#f0f0ee}
.rdm-skip-btn.selected-red{background:#A32D2D;color:#fff;border-color:#A32D2D;font-weight:500}
.rdm-followup{display:none;margin-top:8px;padding:10px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:#fafaf8}
.rdm-followup.open{display:block}
.rdm-followup-label{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:6px}
.rdm-followup-input{width:100%;padding:8px 10px;border:0.5px solid rgba(0,0,0,0.22);border-radius:8px;background:#fff;font-size:12px;font-family:inherit;outline:none}
.rdm-followup-input:focus{border-color:#1a1a1a}
.rdm-title.rdm-missing{color:#A32D2D}
.rdm-opt.missing-opt{border-color:#A32D2D;color:#A32D2D;background:#FEF8F8}
.rdm-opt.missing-opt:hover{background:#FCEBEB}
.drs-opt.missing-opt{border-color:#A32D2D;color:#A32D2D;background:#FEF8F8}
.drs-opt.missing-opt:hover{background:#FCEBEB}
.drs-item.missing-item .drs-q{color:#A32D2D}
.input-invalid{border-color:#A32D2D !important;box-shadow:0 0 0 2px rgba(163,45,45,0.15)}
.btn-secondary.blocked{opacity:.55}
.alkol-toggle-row{display:flex;gap:8px;flex-wrap:wrap}
.alkol-toggle{flex:1;min-width:180px;padding:12px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;cursor:pointer;font-size:13px;color:#1a1a1a;text-align:center;font-family:inherit;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.alkol-toggle:hover{background:#f0f0ee}
.alkol-toggle.selected-no{border:2px solid #3B6D11;background:#EAF3DE;color:#3B6D11;font-weight:500}
.alkol-toggle.selected-yes{border:2px solid #A32D2D;background:#FCEBEB;color:#A32D2D;font-weight:500}
.alkol-toggle.missing{border-color:#A32D2D;color:#A32D2D;background:#FEF8F8}
.alkol-toggle.missing:hover{background:#FCEBEB}

/* DSM-5 kriter, ölçek ve hezeyan stilleri */
.dsm-warning{background:#FAEEDA;color:#854F0B;border:0.5px solid #EF9F27;padding:10px 12px;border-radius:8px;font-size:13px;line-height:1.5;margin-bottom:14px}
.dsm-warning strong{display:block;margin-bottom:3px}
.dsm-section-title{font-size:13px;font-weight:600;color:#1a1a1a;margin:14px 0 8px;text-transform:none}
.crit-item{border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;background:#fff;transition:all 0.15s}
.crit-item:hover{background:#fafaf8}
.crit-item.open{border-color:#185FA5;background:#F5F9FE}
.crit-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.crit-label{font-size:13px;line-height:1.5;flex:1}
.crit-toggle{font-size:18px;color:#888;line-height:1;margin-top:-2px}
.crit-item.open .crit-toggle{color:#185FA5}
.crit-item .crit-toggle::before{content:'+'}
.crit-item.open .crit-toggle::before{content:'−'}
.crit-desc{display:none;margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(0,0,0,0.08);font-size:12px;color:#555;line-height:1.6}
.crit-item.open .crit-desc{display:block}
.crit-letter{font-weight:600;color:#185FA5;margin-right:6px}
.organic-list{background:#FCEBEB;border:0.5px solid #F09595;border-radius:8px;padding:10px 12px;margin:10px 0;font-size:12px;line-height:1.7;color:#7A2222}
.organic-list strong{display:block;margin-bottom:4px;color:#A32D2D}
.scale-item{border:0.5px solid rgba(0,0,0,0.1);border-radius:8px;padding:10px 12px;margin-bottom:6px}
.scale-q{font-size:13px;font-weight:500;margin-bottom:6px;line-height:1.4}
.scale-opts{display:flex;flex-direction:column;gap:4px}
.scale-opt{padding:7px 10px;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;background:#fff;cursor:pointer;font-size:12px;color:#1a1a1a;text-align:left}
.scale-opt:hover{background:#f0f0ee}
.scale-opt.selected{border:2px solid #185FA5;background:#E6F1FB;color:#0C447C}
.hez-item{padding:10px 12px;border-left:3px solid #6B47C9;background:#FAF8FF;border-radius:0 8px 8px 0;margin-bottom:8px}
.hez-name{font-size:13px;font-weight:600;color:#3C3489;margin-bottom:3px}
.hez-desc{font-size:12px;color:#444;line-height:1.55}

</style>
</head>
<body>
<div class="app">
<div id="hezeyan" class="screen active">
  <button class="btn-back" onclick="window.location.href='index.html'"><i class="ti ti-arrow-left"></i> Geri</button>
  <p class="page-title">Hezeyan (Sanrı) Türleri</p>
  <p class="page-sub">DSM-5 glossary — Psikotik sanrı tipleri ve örnekleri</p>

  <div class="card">
    <p style="font-size:12px;color:#666;margin-bottom:12px;line-height:1.55">
      Hezeyan; kanıt karşısında değişmeyen, kişinin kültürüyle uyumsuz, sarsılmaz yanlış inanıştır. Aşağıda en sık görülen 11 tip listelenmiştir.
    </p>
    <div id="hezeyan-list"></div>
  </div>

  <button class="btn-secondary" onclick="window.location.href='index.html'" style="margin-top:8px">Ana ekrana dön</button>
</div>

</div>
<script>
var HEZEYAN_LIST=[
  {n:'Zarar Görme (Persekütör / Komplo) Hezeyanları',
   d:'Kişinin izlendiğine, kendisine komplo kurulduğuna veya zarar verileceğine inanması. <em>Örn: "MİT beni dinliyor, evime kameralar yerleştirdiler, beni öldürmek için zehir karıştırıyorlar."</em>'},
  {n:'Alınma (Referans) Hezeyanları',
   d:'Çevredeki nötr olayların (televizyon haberi, yoldan geçen iki kişinin konuşması, gazete yazısı vb.) doğrudan kendisiyle ilgili olduğuna inanması. <em>Örn: "TV spikeri benim hakkımda konuşuyor, yoldan geçenler bana mesaj veriyor."</em>'},
  {n:'Kıskançlık (Othello) Hezeyanları',
   d:'Eşinin veya partnerinin kendisini aldattığına dair somut kanıt olmaksızın duyulan sarsılmaz inanç. <em>Sıklıkla alkol kullanım bozukluğu, vasküler patoloji veya geç başlangıçlı psikoz zemininde görülür.</em>'},
  {n:'Suçluluk ve Günahkârlık Hezeyanları',
   d:'İşlemediği bir suçtan dolayı kendini aşırı suçlama veya affedilemez günahlar işlediğini düşünme. <em>Genellikle psikotik özellikli ağır depresyonda görülür; intihar riski yüksektir.</em>'},
  {n:'Büyüklük (Grandiyöz) Hezeyanları',
   d:'Kişinin çok ünlü, zengin, özel güçleri olan veya önemli bir tarihi/dini kişilik olduğuna inanması. <em>Manik epizod, şizofreni veya genel parezi (nörosifiliz) ayırıcı tanılarında düşünülür.</em>'},
  {n:'Dinsel (Mistik) Hezeyanlar',
   d:'Dini içerikli, sıra dışı ve kişinin gerçekliğiyle bağdaşmayan aşırı inançlar. <em>Kültürel bağlama göre değerlendirilmelidir; din ile uyumlu inançlar hezeyan sayılmaz.</em>'},
  {n:'Somatik Hezeyanlar',
   d:'Vücudunda ağır bir hastalık, organlarında çürüme veya fiziksel bir deformasyon olduğuna dair inanç. <em>Cotard sendromunda "öldüğüne / organlarının olmadığına" inanma; psikotik depresyon ve nörolojik hastalıklarda görülebilir.</em>'},
  {n:'Kontrol Edilme (Etkilenme) Hezeyanları',
   d:'Düşüncelerinin, duygularının veya hareketlerinin dış bir güç (cihazlar, ışınlar, insanlar) tarafından yönetildiğini hissetme. <em>Şizofreni için Schneider birinci sıra belirtileri arasındadır.</em>'},
  {n:'Düşünce Okunması',
   d:'Başkalarının kendi aklından geçenleri bildiğine dair inanç. <em>Schneider birinci sıra belirtisi.</em>'},
  {n:'Düşünce Yayınlanması (Yayılması)',
   d:'Kendi düşüncelerinin sesli bir şekilde dışarıya yayıldığı ve başkaları tarafından duyulduğu hissi. <em>Schneider birinci sıra belirtisi; şizofreni için karakteristiktir.</em>'},
  {n:'Düşünce Çekilmesi (Sokulması)',
   d:'Düşüncelerinin zihninden zorla alındığı (çekilme) veya yerine başkalarının düşüncelerinin konulduğuna (sokulma) inanma. <em>Schneider birinci sıra belirtisi.</em>'}
];
function openHezeyan(){
  var c=document.getElementById('hezeyan-list');
  if(c){
    c.innerHTML='';
    HEZEYAN_LIST.forEach(function(h){
      var d=document.createElement('div');
      d.className='hez-item';
      d.innerHTML='<p class="hez-name">'+h.n+'</p><p class="hez-desc">'+h.d+'</p>';
      c.appendChild(d);
    });
  }
  go('hezeyan');
}

// Init
document.addEventListener('DOMContentLoaded', function(){
  var c=document.getElementById('hezeyan-list');
  if(c){
    c.innerHTML='';
    HEZEYAN_LIST.forEach(function(h){
      var d=document.createElement('div');
      d.className='hez-item';
      d.innerHTML='<p class="hez-name">'+h.n+'</p><p class="hez-desc">'+h.d+'</p>';
      c.appendChild(d);
    });
  }
});

</script>
</body>
</html>
